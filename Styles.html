<style>
  /* 
 * Document Task Management System
 * CSS Styles — Premium SaaS Design v2.0
 */

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-display: 'Crimson Pro', Georgia, 'Times New Roman', serif;
    --transition-fast: all 0.15s ease;
    --transition-normal: all 0.25s ease;
    --transition-bounce: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    --border-radius-sm: 6px;
    --border-radius-md: 10px;
    --border-radius-lg: 14px;
    --border-radius-xl: 20px;

    /* Primary — warm terracotta */
    --primary: #c96442;
    --primary-hover: #b5573a;
    --primary-light: rgba(201, 100, 66, 0.1);
    --primary-border: rgba(201, 100, 66, 0.25);

    /* Light theme — warm cream */
    --bg-app: #faf9f6;
    --bg-sidebar: #f2ede6;
    --bg-card: #ffffff;
    --bg-input: #faf9f6;
    --bg-input-focus: #ffffff;
    --bg-hover: rgba(28, 25, 22, 0.03);
    --text-main: #1c1916;
    --text-muted: #7a6f66;
    --text-light: #a89f96;
    --border-color: #e5ddd5;
    --border-focus: #c96442;
    --shadow-sm: 0 1px 3px rgba(28, 25, 22, 0.06);
    --shadow-md: 0 4px 16px rgba(28, 25, 22, 0.08);
    --shadow-lg: 0 8px 32px rgba(28, 25, 22, 0.12);
    --shadow-focus: 0 0 0 3px rgba(201, 100, 66, 0.15);

    /* Status system */
    --status-new-bg: #eef2ff;
    --status-new-text: #3b5bdb;
    --status-new-border: #c5cff8;
    --status-doing-bg: #fff8ed;
    --status-doing-text: #b45309;
    --status-doing-border: #fde68a;
    --status-done-bg: #f0faf4;
    --status-done-text: #2d6a4f;
    --status-done-border: #bbf7d0;
    --status-overdue-bg: #fff1f0;
    --status-overdue-text: #c0392b;
    --status-overdue-border: #fecaca;

    /* Progress gradient stops */
    --progress-low: #ef4444;
    --progress-mid: #f59e0b;
    --progress-high: #10b981;
  }

  /* Dark theme — warm charcoal */
  [data-theme="dark"] {
    --bg-app: #1a1714;
    --bg-sidebar: #211e1a;
    --bg-card: #2a2622;
    --bg-input: #211e1a;
    --bg-input-focus: #2a2622;
    --bg-hover: rgba(255, 255, 255, 0.03);
    --text-main: #ede8e1;
    --text-muted: #9a8f84;
    --text-light: #6b6059;
    --border-color: #3a3530;
    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.25);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
    --shadow-focus: 0 0 0 3px rgba(201, 100, 66, 0.2);
    --bg-hover: rgba(255, 255, 255, 0.04);

    --status-new-bg: rgba(59, 91, 219, 0.12);
    --status-new-text: #7b97f0;
    --status-new-border: rgba(59, 91, 219, 0.2);
    --status-doing-bg: rgba(180, 83, 9, 0.15);
    --status-doing-text: #fbbf24;
    --status-doing-border: rgba(180, 83, 9, 0.25);
    --status-done-bg: rgba(45, 106, 79, 0.15);
    --status-done-text: #4ade80;
    --status-done-border: rgba(45, 106, 79, 0.25);
    --status-overdue-bg: rgba(192, 57, 43, 0.15);
    --status-overdue-text: #f87171;
    --status-overdue-border: rgba(192, 57, 43, 0.25);
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: var(--font-main);
    background-color: var(--bg-app);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    font-size: 14px;
    line-height: 1.6;
    transition: background-color 0.3s ease, color 0.3s ease;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── LAYOUT ─────────────────────────────────────── */

  .app-container {
    display: flex;
    width: 100vw;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 240px;
    background-color: var(--bg-sidebar);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 20px 12px;
    position: fixed;
    height: 100vh;
    z-index: 100;
    transition: var(--transition-normal);
  }

  .logo-container {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px 20px;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 16px;
  }

  .logo-icon {
    background: linear-gradient(135deg, var(--primary), #e07d5a);
    color: white;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: -0.5px;
    box-shadow: 0 2px 8px rgba(201, 100, 66, 0.3);
  }

  .logo-text {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.2;
    color: var(--text-main);
  }

  .logo-text span {
    font-size: 11px;
    color: var(--text-muted);
    display: block;
    font-weight: 400;
    margin-top: 1px;
  }

  .nav-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-grow: 1;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    color: var(--text-muted);
    text-decoration: none;
    border-radius: var(--border-radius-sm);
    font-weight: 500;
    font-size: 13.5px;
    cursor: pointer;
    transition: var(--transition-fast);
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    position: relative;
  }

  .nav-link i {
    font-size: 18px;
    flex-shrink: 0;
  }

  .nav-link:hover {
    background-color: var(--bg-hover);
    color: var(--text-main);
  }

  [data-theme="dark"] .nav-link:hover {
    background-color: rgba(255, 255, 255, 0.04);
  }

  .nav-link.active {
    background-color: var(--bg-card);
    color: var(--primary);
    box-shadow: var(--shadow-sm);
    font-weight: 600;
  }

  .nav-link.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 18px;
    background-color: var(--primary);
    border-radius: 0 3px 3px 0;
  }

  /* Sidebar footer */
  .sidebar-footer {
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--border-color);
  }

  .theme-toggle-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border-color);
    background-color: transparent;
    color: var(--text-muted);
    border-radius: var(--border-radius-sm);
    cursor: pointer;
    font-weight: 500;
    font-size: 13px;
    transition: var(--transition-fast);
    font-family: var(--font-main);
  }

  .theme-toggle-btn:hover {
    background-color: var(--bg-card);
    color: var(--text-main);
  }

  /* Main content */
  .main-content {
    flex-grow: 1;
    margin-left: 240px;
    padding: 36px 40px;
    min-height: 100vh;
    transition: var(--transition-normal);
  }

  /* ─── COMMON ELEMENTS ─────────────────────────────── */

  .section-view {
    display: none;
    animation: fadeIn 0.2s ease;
  }

  .section-view.active {
    display: block;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(6px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .header-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }

  .header-title-row h1 {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: var(--text-main);
  }

  /* ─── BUTTONS ─────────────────────────────────────── */

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--border-radius-sm);
    font-weight: 500;
    font-size: 13.5px;
    cursor: pointer;
    transition: var(--transition-fast);
    border: none;
    outline: none;
    font-family: var(--font-main);
    letter-spacing: 0.1px;
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn-primary {
    background-color: var(--primary);
    color: white;
    box-shadow: 0 1px 3px rgba(201, 100, 66, 0.25);
  }

  .btn-primary:hover {
    background-color: var(--primary-hover);
    box-shadow: 0 3px 8px rgba(201, 100, 66, 0.3);
  }

  .btn-secondary {
    background-color: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border-color);
  }

  .btn-secondary:hover {
    background-color: var(--bg-input);
    color: var(--text-main);
    border-color: var(--text-muted);
  }

  .btn-danger {
    background-color: transparent;
    color: #c0392b;
    border: 1px solid var(--status-overdue-border);
  }

  .btn-danger:hover {
    background-color: var(--status-overdue-bg);
    border-color: #c0392b;
  }

  [data-theme="dark"] .btn-danger {
    border-color: rgba(192, 57, 43, 0.3);
  }

  [data-theme="dark"] .btn-danger:hover {
    background-color: rgba(192, 57, 43, 0.12);
  }

  .btn-icon-only {
    width: 32px;
    height: 32px;
    padding: 0;
    border-radius: var(--border-radius-sm);
  }

  .btn-sm {
    padding: 5px 10px;
    font-size: 12px;
  }

  /* ─── CARDS ───────────────────────────────────────── */

  .card {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-md);
    padding: 24px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 20px;
  }

  .card-header-accent {
    border-top: 2px solid var(--primary);
  }

  /* ─── DASHBOARD ───────────────────────────────────── */

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-md);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow-sm);
    transition: var(--transition-fast);
    cursor: default;
  }

  .stat-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  .stat-icon {
    width: 44px;
    height: 44px;
    border-radius: var(--border-radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .stat-info {
    display: flex;
    flex-direction: column;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .stat-total .stat-icon {
    background: rgba(201, 100, 66, 0.1);
    color: var(--primary);
  }

  .stat-doing .stat-icon {
    background: rgba(180, 83, 9, 0.1);
    color: #b45309;
  }

  .stat-done .stat-icon {
    background: rgba(45, 106, 79, 0.1);
    color: #2d6a4f;
  }

  .stat-overdue .stat-icon {
    background: rgba(192, 57, 43, 0.1);
    color: #c0392b;
  }

  .dashboard-sections {
    display: grid;
    grid-template-columns: 3fr 2fr;
    gap: 20px;
  }

  .dashboard-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 380px;
    overflow-y: auto;
    padding-right: 2px;
  }

  .dashboard-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-sm);
    background-color: var(--bg-input);
    transition: var(--transition-fast);
  }

  .dashboard-list-item:hover {
    background-color: var(--bg-card);
    border-color: var(--text-light);
    box-shadow: var(--shadow-sm);
  }

  .item-main {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .item-title {
    font-weight: 600;
    font-size: 13.5px;
  }

  .item-meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ─── FILTERS — SAAS STYLE ────────────────────────── */

  .filter-bar {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-md);
    padding: 16px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }

  .filter-row-top {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 12px;
  }

  .filter-row-bottom {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--border-color);
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 20px;
    padding: 14px 16px;
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-md);
  }

  .search-box {
    position: relative;
    flex-grow: 2;
    min-width: 220px;
  }

  .search-box i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 18px;
    pointer-events: none;
  }

  .search-box input {
    width: 100%;
    padding: 8px 12px 8px 38px;
    border-radius: var(--border-radius-sm);
    border: 1px solid var(--border-color);
    background-color: var(--bg-input);
    color: var(--text-main);
    outline: none;
    font-size: 13.5px;
    font-family: var(--font-main);
    transition: var(--transition-fast);
  }

  .search-box input:focus {
    border-color: var(--primary);
    background-color: var(--bg-input-focus);
    box-shadow: var(--shadow-focus);
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-group label {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    white-space: nowrap;
  }

  .filter-select,
  .form-control {
    padding: 8px 12px;
    border-radius: var(--border-radius-sm);
    border: 1px solid var(--border-color);
    background-color: var(--bg-input);
    color: var(--text-main);
    outline: none;
    font-size: 13.5px;
    font-family: var(--font-main);
    min-width: 130px;
    transition: var(--transition-fast);
  }

  .filter-select:focus,
  .form-control:focus {
    border-color: var(--primary);
    background-color: var(--bg-input-focus);
    box-shadow: var(--shadow-focus);
  }

  /* Date range inputs — compact */
  .filter-date {
    padding: 7px 10px;
    border-radius: var(--border-radius-sm);
    border: 1px solid var(--border-color);
    background-color: var(--bg-input);
    color: var(--text-main);
    outline: none;
    font-size: 12.5px;
    font-family: var(--font-main);
    min-width: 120px;
    transition: var(--transition-fast);
  }

  .filter-date:focus {
    border-color: var(--primary);
    background-color: var(--bg-input-focus);
    box-shadow: var(--shadow-focus);
  }

  .filter-date::-webkit-calendar-picker-indicator {
    opacity: 0.5;
    cursor: pointer;
  }

  /* Filter section header */
  .filter-section-label {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    padding: 3px 8px;
    background: var(--bg-input);
    border-radius: 4px;
    border: 1px solid var(--border-color);
  }

  /* Active filter indicator */
  .filter-active-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 8px 12px;
    background: linear-gradient(to right, rgba(201, 100, 66, 0.06), rgba(201, 100, 66, 0.02));
    border: 1px solid var(--primary-border);
    border-radius: var(--border-radius-sm);
    margin-bottom: 12px;
    animation: fadeIn 0.2s ease;
  }

  .filter-active-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .filter-count-badge {
    background-color: var(--primary);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }

  .result-count-label {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
  }

  .btn-clear-filters {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border: 1px solid var(--primary-border);
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition-fast);
    font-family: var(--font-main);
  }

  .btn-clear-filters:hover {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .btn-clear-filters i {
    font-size: 13px;
  }

  textarea.form-control {
    resize: vertical;
    min-height: 80px;
  }

  /* ─── TABLE ───────────────────────────────────────── */

  .table-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-md);
    background-color: var(--bg-card);
    box-shadow: var(--shadow-sm);
  }

  .custom-table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 13.5px;
  }

  .custom-table th {
    background-color: var(--bg-input);
    padding: 12px 16px;
    font-weight: 600;
    font-size: 11.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    border-bottom: 1px solid var(--border-color);
    white-space: nowrap;
  }

  .custom-table td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border-color);
    vertical-align: middle;
  }

  .custom-table tbody tr:last-child td {
    border-bottom: none;
  }

  .custom-table tbody tr {
    transition: var(--transition-fast);
  }

  .custom-table tbody tr:hover {
    background-color: var(--bg-hover);
  }

  /* ─── BADGES ──────────────────────────────────────── */

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1px;
    border: 1px solid transparent;
  }

  .badge-new {
    background-color: var(--status-new-bg);
    color: var(--status-new-text);
    border-color: var(--status-new-border);
  }

  .badge-doing {
    background-color: var(--status-doing-bg);
    color: var(--status-doing-text);
    border-color: var(--status-doing-border);
  }

  .badge-done {
    background-color: var(--status-done-bg);
    color: var(--status-done-text);
    border-color: var(--status-done-border);
  }

  .badge-overdue {
    background-color: var(--status-overdue-bg);
    color: var(--status-overdue-text);
    border-color: var(--status-overdue-border);
  }

  .badge-assigned {
    background-color: #e0f2fe;
    color: #0369a1;
    border-color: #bae6fd;
  }

  /* ─── PROGRESS BAR — PREMIUM ──────────────────────── */

  .progress-container {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    min-width: 120px;
  }

  .progress-bar-bg {
    flex-grow: 1;
    height: 8px;
    background-color: var(--border-color);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    width: 0%;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    background: linear-gradient(90deg, #10b981, #10b981);
  }

  /* Progress fill colors by percentage — set via JS data-progress attribute */
  .progress-bar-fill[data-pct="low"] {
    background: linear-gradient(90deg, #f87171, #ef4444);
  }

  .progress-bar-fill[data-pct="mid"] {
    background: linear-gradient(90deg, #f59e0b, #fb923c);
  }

  .progress-bar-fill[data-pct="high"] {
